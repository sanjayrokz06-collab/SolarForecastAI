<!DOCTYPE html>
<html>
<head>

    <title>Solar Forecast AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="login-box">

<h1>☀ Solar Forecast AI</h1>

<p>AI Based Solar Forecasting System</p>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

{% if error %}

<p class="error">

{{ error }}

</p>

{% endif %}

</div>

</body>

</html>
